name: Frontend CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noteshub-frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: noteshub-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build